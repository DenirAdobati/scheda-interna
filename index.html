<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scheda Tricologica — Beautri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F3F0EA;
  --card: #FFFFFF;
  --gold: #EAB308;
  --gold-light: #FEF9C3;
  --black: #111827;
  --dark: #1F2937;
  --gray: #6B7280;
  --border: #E2DBC8;
  --radius: 20px;
  --radius-sm: 13px;
  --shadow: 0 2px 18px rgba(0,0,0,.07);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--black); }
 
/* ── HEADER ── */
.header { position: sticky; top: 0; z-index: 100; background: var(--black); }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px 10px; }
.logo { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: .07em; }
.logo span { color: var(--gold); }
.step-info { font-size: 12px; font-weight: 500; color: rgba(255,255,255,.4); white-space: nowrap; }
 
/* ── TIMELINE 5 FASI ── */
.tl-wrap { padding: 0 14px 11px; overflow-x: hidden; }
.tl-row { display: flex; align-items: flex-start; position: relative; }
.tl-item { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; cursor: default; }
.tl-item:not(:last-child)::after {
  content: ''; position: absolute; top: 4px; left: calc(50% + 6px);
  right: calc(-50% + 6px); height: 2px;
  background: rgba(255,255,255,.1); z-index: 0;
}
.tl-item.done:not(:last-child)::after { background: rgba(234,179,8,.4); }
.tl-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,.15); position: relative; z-index: 1;
  flex-shrink: 0; transition: all .3s;
}
.tl-item.done  .tl-dot { background: rgba(234,179,8,.5); }
.tl-item.active .tl-dot { background: var(--gold); box-shadow: 0 0 0 3px rgba(234,179,8,.25); width: 12px; height: 12px; margin-top: -1px; }
.tl-lbl {
  font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  color: rgba(255,255,255,.22); margin-top: 5px; white-space: nowrap;
  overflow: hidden; max-width: 100%; text-overflow: ellipsis; transition: color .3s;
}
.tl-item.done  .tl-lbl { color: rgba(234,179,8,.4); }
.tl-item.active .tl-lbl { color: var(--gold); font-weight: 700; }
 
/* ── MAIN ── */
.main { padding: 26px 18px 100px; max-width: 660px; margin: 0 auto; }
 
/* ── SECTION BADGE ── */
.sec-badge {
  display: inline-flex; align-items: center;
  background: var(--gold); color: var(--black);
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
  padding: 4px 12px; border-radius: 100px; margin-bottom: 13px;
}
 
/* ── CARD ── */
.q-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 22px; animation: fadeUp .22s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.q-num  { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.q-text { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; }
 
/* ── OPTIONS ── */
.opts       { display: flex; flex-direction: column; gap: 8px; }
.opts-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.opts-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
 
.opt {
  display: flex; align-items: center; gap: 11px;
  padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  background: #fff; cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: var(--dark);
  text-align: left; width: 100%;
  transition: border-color .13s, background .13s, transform .08s;
  -webkit-user-select: none; user-select: none;
}
.opt:active { transform: scale(.98); }
.opt.sel { border-color: var(--gold); background: var(--gold-light); color: var(--black); font-weight: 600; }
 
.opt-radio {
  width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; position: relative; transition: all .13s;
  display: flex; align-items: center; justify-content: center;
}
.opt.sel .opt-radio { background: var(--gold); border-color: var(--gold); }
.opt.sel .opt-radio::after { content:''; width:7px; height:7px; border-radius:50%; background:#fff; }
 
.opt-check {
  width: 19px; height: 19px; border-radius: 5px; border: 2px solid var(--border);
  flex-shrink: 0; transition: all .13s; display: flex; align-items: center; justify-content: center;
}
.opt.sel .opt-check { background: var(--gold); border-color: var(--gold); }
.opt.sel .opt-check::after { content:'✓'; font-size:11px; font-weight:800; color:#fff; }
 
/* Grid: center, hide indicator */
.opts-grid2 .opt, .opts-grid3 .opt {
  justify-content: center; text-align: center;
  flex-direction: column; gap: 3px; padding: 14px 6px;
}
.opts-grid2 .opt .opt-radio, .opts-grid3 .opt .opt-radio { display: none; }
 
/* ── COLORI SPECIALI ── */
.opt-si      { border-color: #86EFAC; color: #166534; }
.opt-si.sel  { border-color: #22C55E; background: #DCFCE7; color: #15803D; }
.opt-si.sel  .opt-radio, .opt-si.sel .opt-check { background:#22C55E; border-color:#22C55E; }
 
.opt-no      { border-color: #FCA5A5; color: #991B1B; }
.opt-no.sel  { border-color: #EF4444; background: #FEE2E2; color: #B91C1C; }
.opt-no.sel  .opt-radio, .opt-no.sel .opt-check { background:#EF4444; border-color:#EF4444; }
 
.opt-maschio      { border-color: #93C5FD; color: #1E40AF; }
.opt-maschio.sel  { border-color: #3B82F6; background: #DBEAFE; color: #1D4ED8; }
.opt-maschio.sel  .opt-radio { background:#3B82F6; border-color:#3B82F6; }
 
.opt-femmina      { border-color: #F9A8D4; color: #9D174D; }
.opt-femmina.sel  { border-color: #EC4899; background: #FCE7F3; color: #BE185D; }
.opt-femmina.sel  .opt-radio { background:#EC4899; border-color:#EC4899; }
 
/* ── NAME INPUTS ── */
.name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.inp-group label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--gray); margin-bottom:6px; }
input[type=text], textarea {
  width:100%; padding:12px 14px;
  border:2px solid var(--border); border-radius:var(--radius-sm);
  font-family:'Inter',sans-serif; font-size:15px; color:var(--black);
  background:#fff; outline:none; transition:border-color .13s; -webkit-appearance:none;
}
input[type=text]:focus, textarea:focus { border-color:var(--gold); }
textarea { min-height:100px; resize:vertical; font-size:14px; }
 
/* ── SCALE ── */
.scale-wrap { display:flex; flex-direction:column; gap:11px; }
.scale-ends { display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:var(--gray); text-transform:uppercase; letter-spacing:.06em; }
.scale-btns { display:flex; gap:5px; }
.scale-btn  { flex:1; padding:13px 3px; border:2px solid var(--border); border-radius:var(--radius-sm); background:#fff; font-family:'Inter',sans-serif; font-size:15px; font-weight:700; color:var(--gray); cursor:pointer; text-align:center; transition:all .13s; }
.scale-btn.sel { background:var(--gold); border-color:var(--gold); color:var(--black); }
 
/* ── OTHER ── */
.other-row  { display:flex; align-items:center; gap:9px; margin-top:9px; }
.other-lbl  { font-size:13px; font-weight:600; color:var(--gray); white-space:nowrap; }
.other-inp  { flex:1; padding:10px 13px; border:2px solid var(--border); border-radius:10px; font-family:'Inter',sans-serif; font-size:14px; background:#fff; outline:none; transition:border-color .13s; }
.other-inp:focus { border-color:var(--gold); }
 
/* ── MATRIX ── */
.mx-scroll { overflow-x:auto; }
.mx-table  { width:100%; border-collapse:separate; border-spacing:0; }
.mx-table th { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--gray); padding:5px 4px; text-align:center; }
.mx-table th:first-child { text-align:left; }
.mx-table td { padding:10px 4px; text-align:center; border-top:1px solid var(--border); }
.mx-table td:first-child { text-align:left; font-size:13px; font-weight:500; padding-right:10px; white-space:nowrap; }
.mx-dot { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); cursor:pointer; margin:0 auto; transition:all .13s; }
.mx-dot.sel { background:var(--gold); border-color:var(--gold); }
 
/* ── SCALE CLINICHE ── */
.clinical-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.clinical-item {
  padding:14px 12px; border:2px solid var(--border); border-radius:var(--radius-sm);
  background:#fff; cursor:pointer; text-align:center; transition:all .13s;
}
.clinical-item:active { transform:scale(.97); }
.clinical-item.sel { border-color:var(--gold); background:var(--gold-light); }
.clinical-item .ci-stage { font-size:18px; font-weight:800; color:var(--gold); margin-bottom:5px; }
.clinical-item.sel .ci-stage { color:var(--black); }
.clinical-item .ci-label { font-size:13px; font-weight:600; color:var(--dark); margin-bottom:3px; }
.clinical-item .ci-desc  { font-size:11px; color:var(--gray); line-height:1.4; }
.clinical-item.sel .ci-desc { color:#4B5563; }
 
/* ── CASO SPECIFICO SELECTOR ── */
.caso-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.caso-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 28px 16px; border: 3px solid var(--border); border-radius: var(--radius);
  background: #fff; cursor: pointer; transition: all .15s;
  min-height: 120px;
}
.caso-btn:active { transform: scale(.97); }
.caso-btn.sel { border-color: var(--gold); background: var(--gold-light); }
.caso-btn .caso-icon { font-size: 36px; margin-bottom: 10px; }
.caso-btn .caso-label { font-size: 14px; font-weight: 700; color: var(--dark); text-transform: uppercase; letter-spacing: .05em; text-align: center; }
.caso-btn.sel .caso-label { color: var(--black); }
 
.caso-btn.uomo { border-color: #93C5FD; }
.caso-btn.uomo:active, .caso-btn.uomo.sel { border-color: #3B82F6; background: #DBEAFE; }
.caso-btn.donna { border-color: #F9A8D4; }
.caso-btn.donna:active, .caso-btn.donna.sel { border-color: #EC4899; background: #FCE7F3; }
.caso-btn.mamma { border-color: #A5B4FC; }
.caso-btn.mamma:active, .caso-btn.mamma.sel { border-color: #6366F1; background: #E0E7FF; }
.caso-btn.menopausa { border-color: #C4B5FD; }
.caso-btn.menopausa:active, .caso-btn.menopausa.sel { border-color: #8B5CF6; background: #EDE9FE; }
 
/* ── COMPLETION ── */
.done-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:46px 26px; text-align:center; animation:fadeUp .3s ease both; }
.done-icon { width:74px; height:74px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; font-size:32px; }
.done-card h2 { font-size:24px; font-weight:800; margin-bottom:7px; }
.done-card p  { font-size:14px; color:var(--gray); margin-bottom:28px; }
.done-btns { display:flex; gap:9px; justify-content:center; flex-wrap:wrap; }
.btn-gold { padding:14px 30px; background:var(--gold); border:none; border-radius:var(--radius-sm); font-family:'Inter',sans-serif; font-size:15px; font-weight:700; color:var(--black); cursor:pointer; }
.btn-dark { padding:14px 30px; background:var(--black); border:none; border-radius:var(--radius-sm); font-family:'Inter',sans-serif; font-size:15px; font-weight:700; color:#fff; cursor:pointer; }
 
/* ── FOOTER NAV ── */
.nav-footer { position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.95); backdrop-filter:blur(12px); border-top:1px solid var(--border); padding:13px 18px 20px; z-index:100; }
.nav-inner  { display:flex; gap:9px; max-width:660px; margin:0 auto; }
.btn-back { padding:14px 18px; border:2px solid var(--border); border-radius:var(--radius-sm); background:#fff; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; color:var(--gray); cursor:pointer; white-space:nowrap; transition:all .13s; }
.btn-back:disabled { opacity:.3; cursor:not-allowed; }
.btn-next { flex:1; padding:14px; background:var(--gold); border:none; border-radius:var(--radius-sm); font-family:'Inter',sans-serif; font-size:15px; font-weight:700; color:var(--black); cursor:pointer; transition:all .13s; }
 
@media (max-width:600px) {
  .name-row { grid-template-columns:1fr; }
  .opts-grid3 { grid-template-columns:1fr 1fr; }
  .q-text { font-size:16px; }
  .clinical-grid { grid-template-columns:1fr 1fr; }
  .caso-selector { grid-template-columns: 1fr; }
}
@media print {
  .header, .nav-footer { display:none !important; }
  .main { padding:16px !important; }
  body { background:#fff !important; }
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-top">
      <div class="logo">BEAU<span>TRÌ</span></div>
      <div class="step-info" id="stepInfo">1 / 74</div>
    </div>
    <div class="tl-wrap"><div class="tl-row" id="timeline"></div></div>
  </header>
 
  <main class="main" id="main"></main>
 
  <footer class="nav-footer" id="navFooter">
    <div class="nav-inner">
      <button class="btn-back" id="btnBack" onclick="goBack()">← Indietro</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Avanti →</button>
    </div>
  </footer>
</div>
 
<script>
// ═══════════════════════════════════════
// TUTTE LE DOMANDE
// ═══════════════════════════════════════
 
// ── FASE 1 – CONOSCITIVA (Q1-Q9) ──
const Q_CONOSCITIVA = [
  { id:1, sec:'Fase Conoscitiva', q:'Qual è il tuo nome?', type:'name' },
  { id:2, sec:'Fase Conoscitiva', q:'Sesso', type:'radio', opts:['Maschio','Femmina'] },
  { id:3, sec:'Fase Conoscitiva', q:'Età', type:'radio-grid2', opts:['0–10 anni','10–20 anni','20–30 anni','30–40 anni','40–50 anni','50–60 anni','> 60 anni'] },

  { id:6, sec:'Fase Conoscitiva', q:'Anamnesi personale', type:'check-other', opts:['Attività sportiva'] },

  { id:8, sec:'Fase Conoscitiva', q:'Quando hai lavato l\'ultima volta i capelli?', type:'radio-grid2', opts:['Oggi','Ieri','2 giorni fa','Più di 2 giorni fa'] },

];
 
// ── FASE 2 – INDAGINE (Q10-Q27) ──
const Q_INDAGINE = [
  { id:10, sec:'Fase di Indagine', q:'Esigenza / causa', type:'check-other', opts:['Problemi fisici negli ultimi anni','Operazioni','Diete'] },

  { id:23, sec:'Fase di Indagine', q:'Ti senti stressato/a?', type:'radio-grid3', opts:['Sì','No','Abbastanza'] },
  { id:24, sec:'Fase di Indagine', q:'Il tuo lavoro ti mette a dura prova mentalmente e fisicamente? (es. turni di notte)', type:'radio-grid3', opts:['Sì','No','Abbastanza'] },

// ── CASI SPECIFICI ──
const Q_UOMO = [
  { id:28, sec:'Uomo Giovane', q:'Tuo padre ha perso i capelli?', type:'check-other', opts:['Sì','No'] },
  { id:29, sec:'Uomo Giovane', q:'Tua madre ha perso i capelli?', type:'check-other', opts:['Sì','No'] },

];
 
const Q_MAMMA = [
  { id:42, sec:'Neo Mamma', q:'Da quanto hai partorito?', type:'radio-grid3', opts:['Da 3 mesi','Da 6 mesi','Da più di un anno'] },
  { id:43, sec:'Neo Mamma', q:'Hai riscontrato in gravidanza o dopo il parto carenze di ferritina, vitamina D, anemie, acido folico, vitamina B12 o disturbi della tiroide?', type:'check-other', opts:['Sì','No'] },
  { id:44, sec:'Neo Mamma', q:'Stai allattando?', type:'radio', opts:['Sì','No'] },
  { id:45, sec:'Neo Mamma', q:'Fai spesso servizi di stiratura / permanente, colorazione / schiariture?', type:'radio-grid3', opts:['Spesso','A volte','Mai'] },
  { id:46, sec:'Neo Mamma', q:'I capelli ti sembrano secchi, spenti o che manchino di luminosità?', type:'radio', opts:['Sì','No'] },
  { id:47, sec:'Neo Mamma', q:'I capelli ti sembrano che manchino di volume?', type:'radio', opts:['Sì','No'] },
];
 
const Q_MENOPAUSA = [
  { id:48, sec:'Donna Mezza Età', q:'Hai problemi di salute?', type:'check-other', opts:['Sì','No'] },
  { id:49, sec:'Donna Mezza Età', q:'Hai mai riscontrato carenze di ferritina, vitamina D, anemie o disturbi della tiroide?', type:'check-other', opts:['Sì','No'] },
  { id:50, sec:'Donna Mezza Età', q:'Ti fanno male i capelli o la cute?', type:'radio', opts:['Sì','No'] },
  { id:51, sec:'Donna Mezza Età', q:'Lavando la testa cadono tanti capelli?', type:'radio', opts:['Sì','No'] },
  { id:52, sec:'Donna Mezza Età', q:'Com\'è il tuo umore?', type:'radio', opts:['Sono spesso triste o nervosa','A volte sono nervosa e stanca','Non riesco a dormire','Mi sento bene','Non mi sento bene'] },
  { id:53, sec:'Donna Mezza Età', q:'Ti vedi diradata?', type:'check-other', opts:['Sì','No'] },
  { id:54, sec:'Donna Mezza Età', q:'Fai spesso servizi di stiratura / permanente, colorazione / schiariture?', type:'radio-grid3', opts:['Spesso','A volte','Mai'] },
  { id:55, sec:'Donna Mezza Età', q:'I capelli ti sembrano secchi, spenti o che manchino di luminosità?', type:'radio', opts:['Sì','No'] },
  { id:56, sec:'Donna Mezza Età', q:'I capelli ti sembrano che manchino di volume?', type:'radio', opts:['Sì','No'] },
];
 
// ── FASE VISIVA E TATTILE ──
const Q_VISIVA = [
  { id:100, sec:'Fase Visiva e Tattile', q:'Scala di Hamilton-Norwood — calvizie maschile', type:'norwood' },
  { id:101, sec:'Fase Visiva e Tattile', q:'Scala di Ludwig — diradamento femminile', type:'ludwig' },
  { id:102, sec:'Fase Visiva e Tattile', q:'Osservazioni con Proscope (ingrandimento 200X)', type:'textarea' },
  { id:103, sec:'Fase Visiva e Tattile', q:'Gravità in relazione all\'età', type:'matrix-gravity' },
  { id:104, sec:'Fase Visiva e Tattile', q:'Caduta — tipo e entità', type:'radio', opts:['Assente','Lieve (< 50 capelli/giorno)','Moderata (50–100 capelli/giorno)','Intensa (> 100 capelli/giorno)'] },
  { id:105, sec:'Fase Visiva e Tattile', q:'Zone colpite', type:'check-other', opts:['Frontale','Tempie','Vertice / Corona','Occipitale','Laterale sinistra','Laterale destra','Diffusa'] },
  { id:106, sec:'Fase Visiva e Tattile', q:'Cuoio capelluto — aspetto lipidico', type:'radio-grid3', opts:['Secco','Normale','Grasso'] },
  { id:107, sec:'Fase Visiva e Tattile', q:'Cuoio capelluto — spessore', type:'radio-grid3', opts:['Sottile','Normale','Spesso'] },
  { id:108, sec:'Fase Visiva e Tattile', q:'Cuoio capelluto — tensione', type:'radio-grid3', opts:['Bassa','Normale','Alta'] },
  { id:109, sec:'Fase Visiva e Tattile', q:'Cuoio capelluto — colore', type:'radio-grid3', opts:['Rosa (normale)','Arrossato','Pallido'] },
  { id:110, sec:'Fase Visiva e Tattile', q:'Forfora — tipo', type:'radio', opts:['Assente','Pitiriasi secca','Pitiriasi grassa','Squame aderenti'] },
  { id:111, sec:'Fase Visiva e Tattile', q:'Prurito — intensità', type:'radio-grid2', opts:['Assente','Lieve','Moderato','Intenso'] },
  { id:112, sec:'Fase Visiva e Tattile', q:'Odore del cuoio capelluto', type:'radio-grid3', opts:['Assente','Lieve','Intenso'] },
  { id:113, sec:'Fase Visiva e Tattile', q:'Sudorazione', type:'radio-grid3', opts:['Scarsa','Normale','Eccessiva'] },
  { id:114, sec:'Fase Visiva e Tattile', q:'Caratteristiche dei capelli', type:'check-other', opts:['Secchi','Grassi','Fragili','Spenti','Privi di volume','Con doppie punte','Trattati chimicamente'] },
  { id:115, sec:'Fase Visiva e Tattile', q:'Tipo di incidenze', type:'matrix-incidenze' },
  { id:116, sec:'Fase Visiva e Tattile', q:'Note finali', type:'textarea' },
];
 
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  step: 'conoscitiva',    // conoscitiva, indagine, selector, caso, visiva, done
  qIdx: 0,                // indice domanda corrente nella fase
  casoTipo: null,         // 'uomo', 'donna', 'mamma', 'menopausa'
  answers: {},
  checkAns: {},
  otherTxt: {},
  gravity: {},
  incidenze: new Set(),
};
 
// Domande attive in base allo step
function getActiveQuestions() {
  switch(S.step) {
    case 'conoscitiva': return Q_CONOSCITIVA;
    case 'indagine': return Q_INDAGINE;
    case 'caso':
      if (S.casoTipo === 'uomo') return Q_UOMO;
      if (S.casoTipo === 'donna') return Q_DONNA;
      if (S.casoTipo === 'mamma') return Q_MAMMA;
      if (S.casoTipo === 'menopausa') return Q_MENOPAUSA;
      return [];
    case 'visiva': return Q_VISIVA;
    default: return [];
  }
}
 
function cur() { 
  const qs = getActiveQuestions();
  return qs[S.qIdx] || null;
}
 
function getCasoLength() {
  if (S.casoTipo === 'uomo') return Q_UOMO.length;
  if (S.casoTipo === 'donna') return Q_DONNA.length;
  if (S.casoTipo === 'mamma') return Q_MAMMA.length;
  if (S.casoTipo === 'menopausa') return Q_MENOPAUSA.length;
  return 6;
}
 
function globalProgress() {
  let done = 0;
  let casoLen = S.casoTipo ? getCasoLength() : 6;
  
  if (S.step === 'conoscitiva') done = S.qIdx;
  else if (S.step === 'indagine') done = Q_CONOSCITIVA.length + S.qIdx;
  else if (S.step === 'selector') done = Q_CONOSCITIVA.length + Q_INDAGINE.length;
  else if (S.step === 'caso') done = Q_CONOSCITIVA.length + Q_INDAGINE.length + 1 + S.qIdx;
  else if (S.step === 'visiva') done = Q_CONOSCITIVA.length + Q_INDAGINE.length + 1 + casoLen + S.qIdx;
  else if (S.step === 'done') return 'Completato';
  
  const total = Q_CONOSCITIVA.length + Q_INDAGINE.length + 1 + casoLen + Q_VISIVA.length;
  return (done + 1) + ' / ' + total;
}
 
// ═══════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════
function renderTimeline() {
  const tl = document.getElementById('timeline');
  if (!tl) return;
  
  const phases = [
    { label: 'Conoscitiva', active: S.step === 'conoscitiva' },
    { label: 'Indagine', active: S.step === 'indagine' },
    { label: 'Caso', active: S.step === 'selector' || S.step === 'caso' },
    { label: 'Visiva', active: S.step === 'visiva' },
    { label: 'Fine', active: S.step === 'done' },
  ];
  
  let currentIdx = phases.findIndex(p => p.active);
  
  let html = '';
  phases.forEach((p, i) => {
    let cls = 'tl-item';
    if (i < currentIdx) cls += ' done';
    if (i === currentIdx) cls += ' active';
    html += `<div class="${cls}"><div class="tl-dot"></div><div class="tl-lbl">${p.label}</div></div>`;
  });
  tl.innerHTML = html;
}
 
// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function goBack() {
  if (S.step === 'conoscitiva' && S.qIdx > 0) {
    S.qIdx--;
  } else if (S.step === 'indagine' && S.qIdx > 0) {
    S.qIdx--;
  } else if (S.step === 'indagine' && S.qIdx === 0) {
    S.step = 'conoscitiva';
    S.qIdx = Q_CONOSCITIVA.length - 1;
  } else if (S.step === 'selector') {
    S.step = 'indagine';
    S.qIdx = Q_INDAGINE.length - 1;
  } else if (S.step === 'caso' && S.qIdx > 0) {
    S.qIdx--;
  } else if (S.step === 'caso' && S.qIdx === 0) {
    S.step = 'selector';
    S.casoTipo = null;
  } else if (S.step === 'visiva' && S.qIdx > 0) {
    S.qIdx--;
  } else if (S.step === 'visiva' && S.qIdx === 0) {
    S.step = 'caso';
    S.qIdx = getActiveQuestions().length - 1;
  }
  render();
}
 
function goNext() {
  const qs = getActiveQuestions();
  
  if (S.step === 'conoscitiva') {
    if (S.qIdx < qs.length - 1) {
      S.qIdx++;
    } else {
      S.step = 'indagine';
      S.qIdx = 0;
    }
  } else if (S.step === 'indagine') {
    if (S.qIdx < qs.length - 1) {
      S.qIdx++;
    } else {
      S.step = 'selector';
    }
  } else if (S.step === 'caso') {
    if (S.qIdx < qs.length - 1) {
      S.qIdx++;
    } else {
      S.step = 'visiva';
      S.qIdx = 0;
    }
  } else if (S.step === 'visiva') {
    if (S.qIdx < qs.length - 1) {
      S.qIdx++;
    } else {
      S.step = 'done';
    }
  }
  render();
}
 
function selectCaso(tipo) {
  S.casoTipo = tipo;
  S.step = 'caso';
  S.qIdx = 0;
  render();
}
 
// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function optColorClass(val) {
  const v = (val || '').trim();
  if (v === 'Sì') return ' opt-si';
  if (v === 'No') return ' opt-no';
  if (v === 'Maschio') return ' opt-maschio';
  if (v === 'Femmina') return ' opt-femmina';
  return '';
}
function escQ(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
 
// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render() {
  renderTimeline();
 
  const main = document.getElementById('main');
  const btnBack = document.getElementById('btnBack');
  const btnNext = document.getElementById('btnNext');
  const navFoot = document.getElementById('navFooter');
  const siInfo = document.getElementById('stepInfo');
 
  siInfo.textContent = globalProgress();
  btnBack.disabled = (S.step === 'conoscitiva' && S.qIdx === 0);
 
  if (S.step === 'done') {
    navFoot.style.display = 'none';
    renderDone(main);
    return;
  }
 
  navFoot.style.display = '';
 
  if (S.step === 'selector') {
    btnNext.style.display = 'none';
    renderSelector(main);
    return;
  }
 
  btnNext.style.display = '';
  
  const q = cur();
  if (!q) return;
 
  let html = `<div class="sec-badge">${q.sec}</div>
<div class="q-card">
  <div class="q-num">Domanda ${q.id}</div>
  <div class="q-text">${q.q}</div>`;
  html += renderInput(q);
  html += `</div>`;
  main.innerHTML = html;
}
 
function renderSelector(main) {
  main.innerHTML = `
  <div class="sec-badge">Seleziona Caso Specifico</div>
  <div class="q-card">
    <div class="q-text">Seleziona il caso specifico per questo cliente:</div>
    <div class="caso-selector">
      <button class="caso-btn uomo" onclick="selectCaso('uomo')">
        <div class="caso-icon">👨</div>
        <div class="caso-label">Uomo Giovane</div>
      </button>
      <button class="caso-btn donna" onclick="selectCaso('donna')">
        <div class="caso-icon">👩</div>
        <div class="caso-label">Donna Giovane</div>
      </button>
      <button class="caso-btn mamma" onclick="selectCaso('mamma')">
        <div class="caso-icon">🤱</div>
        <div class="caso-label">Neo Mamma</div>
      </button>
      <button class="caso-btn menopausa" onclick="selectCaso('menopausa')">
        <div class="caso-icon">👩‍🦳</div>
        <div class="caso-label">Donna Mezza Età</div>
      </button>
    </div>
  </div>`;
}
 
function renderInput(q) {
  switch (q.type) {
    case 'name':            return rName(q);
    case 'radio':           return rRadioList(q);
    case 'radio-grid2':     return rRadioGrid(q, 2);
    case 'radio-grid3':     return rRadioGrid(q, 3);
    case 'check-other':     return rCheckOther(q);
    case 'scale':           return rScale(q);
    case 'textarea':        return rTextarea(q);
    case 'matrix-gravity':  return rMatrixGravity();
    case 'matrix-incidenze':return rMatrixIncidenze();
    case 'norwood':         return rNorwood(q);
    case 'ludwig':          return rLudwig(q);
    default: return '';
  }
}
 
function rName(q) {
  const first = S.answers[q.id + '_first'] || '';
  const last  = S.answers[q.id + '_last']  || '';
  return `<div class="name-row">
    <div class="inp-group"><label>Nome</label><input type="text" value="${first}" placeholder="Nome" oninput="S.answers[${q.id}+'_first']=this.value"></div>
    <div class="inp-group"><label>Cognome</label><input type="text" value="${last}" placeholder="Cognome" oninput="S.answers[${q.id}+'_last']=this.value"></div>
  </div>`;
}
 
function rRadioList(q) {
  return '<div class="opts">' + q.opts.map(o => {
    const sel = S.answers[q.id] === o ? ' sel' : '';
    const col = optColorClass(o);
    return `<button class="opt${sel}${col}" onclick="pickR(${q.id},'${escQ(o)}')"><span class="opt-radio"></span>${o}</button>`;
  }).join('') + '</div>';
}
 
function rRadioGrid(q, cols) {
  const cls = cols === 3 ? 'opts-grid3' : 'opts-grid2';
  return '<div class="' + cls + '">' + q.opts.map(o => {
    const sel = S.answers[q.id] === o ? ' sel' : '';
    const col = optColorClass(o);
    return `<button class="opt${sel}${col}" onclick="pickR(${q.id},'${escQ(o)}')"><span class="opt-radio"></span>${o}</button>`;
  }).join('') + '</div>';
}
 
function rCheckOther(q) {
  const set   = S.checkAns[q.id] || new Set();
  const other = S.otherTxt[q.id] || '';
  let html = '<div class="opts">';
  q.opts.forEach(o => {
    const sel = set.has(o) ? ' sel' : '';
    const col = optColorClass(o);
    html += `<button class="opt${sel}${col}" onclick="toggleC(${q.id},'${escQ(o)}')"><span class="opt-check"></span>${o}</button>`;
  });
  html += '</div>';
  html += `<div class="other-row"><span class="other-lbl">Altro:</span><input class="other-inp" type="text" value="${other}" placeholder="Specifica…" oninput="S.otherTxt[${q.id}]=this.value"></div>`;
  return html;
}
 
function rScale(q) {
  const val = S.answers[q.id];
  let btns = '';
  for (let i = 1; i <= 10; i++) {
    const sel = val == i ? ' sel' : '';
    btns += `<button class="scale-btn${sel}" onclick="pickS(${q.id},${i})">${i}</button>`;
  }
  return `<div class="scale-wrap">
    <div class="scale-ends"><span>Pessima</span><span>Ottima</span></div>
    <div class="scale-btns">${btns}</div>
  </div>`;
}
 
function rTextarea(q) {
  const val = S.answers[q.id] || '';
  return `<textarea placeholder="Scrivi qui…" oninput="S.answers[${q.id}]=this.value">${val}</textarea>`;
}
 
function rMatrixGravity() {
  const zones = ['Attaccatura frontale','Tempie','Vertice / Corona','Zona occipitale','Laterale sinistra','Laterale destra'];
  const cols  = ['1','2','3','4','5'];
  let html = '<div class="mx-scroll"><table class="mx-table"><thead><tr><th>Zona</th>';
  cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  zones.forEach(z => {
    html += `<tr><td>${z}</td>`;
    cols.forEach((c, ci) => {
      const sel = S.gravity[z] === ci ? ' sel' : '';
      html += `<td><div class="mx-dot${sel}" onclick="pickGrav('${escQ(z)}',${ci})"></div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
 
function rMatrixIncidenze() {
  const types = [
    'Alopecia androgenetica','Alopecia areata','Alopecia da trazione',
    'Telogen effluvium','Anagen effluvium','Dermatite seborroica',
    'Pitiriasi','Psoriasi del cuoio capelluto','Tricotillomania'
  ];
  let html = '<div class="opts">';
  types.forEach(t => {
    const sel = S.incidenze.has(t) ? ' sel' : '';
    html += `<button class="opt${sel}" onclick="toggleI('${escQ(t)}')"><span class="opt-check"></span>${t}</button>`;
  });
  html += '</div>';
  const other = S.otherTxt['incid'] || '';
  html += `<div class="other-row"><span class="other-lbl">Altro:</span><input class="other-inp" type="text" value="${other}" placeholder="Specifica…" oninput="S.otherTxt['incid']=this.value"></div>`;
  return html;
}
 
const NORWOOD_STAGES = [
  { stage:'I',    label:'Stadio I',    desc:'Attaccatura intatta, nessuna recessione' },
  { stage:'II',   label:'Stadio II',   desc:'Leggera recessione sulle tempie' },
  { stage:'III',  label:'Stadio III',  desc:'Recessione temporale pronunciata' },
  { stage:'IIIv', label:'Stadio IIIv', desc:'Perdita al vertice con tempie intatte' },
  { stage:'IV',   label:'Stadio IV',   desc:'Forte recessione + inizio calvizie al vertice' },
  { stage:'V',    label:'Stadio V',    desc:'Zona frontale e vertice quasi unite' },
  { stage:'VI',   label:'Stadio VI',   desc:'Fronte e vertice si uniscono' },
  { stage:'VII',  label:'Stadio VII',  desc:'Solo fascia laterale e occipitale rimane' },
];
function rNorwood(q) {
  let html = '<div class="clinical-grid">';
  NORWOOD_STAGES.forEach(s => {
    const sel = S.answers[q.id] === s.stage ? ' sel' : '';
    html += `<div class="clinical-item${sel}" onclick="pickR(${q.id},'${escQ(s.stage)}')">
      <div class="ci-stage">${s.stage}</div>
      <div class="ci-label">${s.label}</div>
      <div class="ci-desc">${s.desc}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}
 
const LUDWIG_STAGES = [
  { stage:'I',   label:'Grado I',   desc:'Diradamento lieve — visibile alla scriminatura' },
  { stage:'II',  label:'Grado II',  desc:'Diradamento moderato — scriminatura ampia' },
  { stage:'III', label:'Grado III', desc:'Diradamento grave — cuoio capelluto ben visibile' },
];
function rLudwig(q) {
  let html = '<div class="opts">';
  LUDWIG_STAGES.forEach(s => {
    const sel = S.answers[q.id] === s.stage ? ' sel' : '';
    html += `<div class="clinical-item${sel}" onclick="pickR(${q.id},'${escQ(s.stage)}')" style="text-align:left;padding:16px 18px;">
      <div class="ci-stage" style="font-size:16px;margin-bottom:4px;">${s.label}</div>
      <div class="ci-desc">${s.desc}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}
 
function renderDone(main) {
  const name = (S.answers['1_first'] || '') + ' ' + (S.answers['1_last'] || '');
  const display = name.trim() ? name.trim() : null;
  main.innerHTML = `
  <div class="done-card">
    <div class="done-icon">✓</div>
    <h2>Scheda completata!</h2>
    <p>${display ? 'Grazie <strong>' + display + '</strong>.<br>' : ''}La scheda tricologica è stata compilata con successo.</p>
    <div class="done-btns">
      <button class="btn-dark" onclick="window.print()">🖨 Stampa scheda</button>
      <button class="btn-gold" onclick="resetForm()">+ Nuova scheda</button>
    </div>
  </div>`;
}
 
// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function pickR(id, val) {
  S.answers[id] = val;
  render();
}
function pickS(id, val) {
  S.answers[id] = val;
  render();
}
function toggleC(id, val) {
  if (!S.checkAns[id]) S.checkAns[id] = new Set();
  if (S.checkAns[id].has(val)) S.checkAns[id].delete(val);
  else S.checkAns[id].add(val);
  render();
}
function pickGrav(zone, col) {
  if (S.gravity[zone] === col) delete S.gravity[zone];
  else S.gravity[zone] = col;
  render();
}
function toggleI(val) {
  if (S.incidenze.has(val)) S.incidenze.delete(val);
  else S.incidenze.add(val);
  render();
}
function resetForm() {
  S = { step:'conoscitiva', qIdx:0, casoTipo:null, answers:{}, checkAns:{}, otherTxt:{}, gravity:{}, incidenze:new Set() };
  document.getElementById('navFooter').style.display = '';
  render();
}
 
// ── INIT ──
render();
</script>
